# Render blueprint for the FiberPayKit API (Fastify + Postgres).
#
# Deploy: https://render.com → New → Blueprint → point at this repo.
# Render will create the web service + a free PostgreSQL database.
#
# Runs in mock Fiber mode by default (no real Fiber node or Redis required —
# webhooks deliver inline when Redis is absent). Schema is applied with
# `prisma db push` and the demo merchant is seeded (API key: fpk_test_demo).
#
# After the first deploy, set WEB_URL / API_URL / CORS_ORIGINS (see below) to
# your real URLs and redeploy.

services:
  - type: web
    name: fiberpaykit-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @fiberpaykit/shared build &&
      pnpm --filter @fiberpaykit/sdk build &&
      pnpm --filter @fiberpaykit/api build &&
      pnpm --filter @fiberpaykit/api db:push &&
      pnpm --filter @fiberpaykit/api db:seed
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FIBER_MODE
        value: mock
      - key: DATABASE_URL
        fromDatabase:
          name: fiberpaykit-db
          property: connectionString
      # Generated once and kept stable across deploys so the seeded demo API
      # key hash (fpk_test_demo) stays valid.
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Set these after you know your Vercel + Render URLs, then redeploy:
      #   WEB_URL      = https://<your-app>.vercel.app   (checkout URLs point here)
      #   API_URL      = https://fiberpaykit-api.onrender.com
      #   CORS_ORIGINS = https://<your-app>.vercel.app
      - key: WEB_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: fiberpaykit-db
    plan: free
