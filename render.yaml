# Render blueprint for the FiberPayKit API (Fastify + Postgres + Redis).
#
# Deploy: https://render.com → New → Blueprint → point at this repo.
# Render creates the web service + a free PostgreSQL database + a free Redis
# (Key Value) instance used for response caching and the BullMQ webhook queue.
#
# Runs in mock Fiber mode by default. Redis is optional — if you remove the
# `- type: redis` block below, the app degrades gracefully (inline webhook
# delivery + no cache). Schema is applied with `prisma db push` and the demo
# merchant is seeded (API key: fpk_test_demo).
#
# After the first deploy, set WEB_URL / API_URL / CORS_ORIGINS (see below) to
# your real URLs and redeploy.

services:
  - type: web
    name: fiberpaykit-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile=false &&
      pnpm --filter @fiberpaykit/shared build &&
      pnpm --filter @fiberpaykit/sdk build &&
      pnpm --filter @fiberpaykit/api build &&
      pnpm --filter @fiberpaykit/api db:push &&
      pnpm --filter @fiberpaykit/api db:seed
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FIBER_MODE
        value: mock
      - key: DATABASE_URL
        fromDatabase:
          name: fiberpaykit-db
          property: connectionString
      # Redis for caching + BullMQ. Uses Render's internal network URL.
      - key: REDIS_URL
        fromService:
          type: redis
          name: fiberpaykit-redis
          property: connectionString
      # Generated once and kept stable across deploys so the seeded demo API
      # key hash (fpk_test_demo) stays valid.
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Set these after you know your Vercel + Render URLs, then redeploy:
      #   WEB_URL      = https://<your-app>.vercel.app   (checkout URLs point here)
      #   API_URL      = https://fiberpaykit-api.onrender.com
      #   CORS_ORIGINS = https://<your-app>.vercel.app
      - key: WEB_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # Redis (Render "Key Value"). noeviction is required by BullMQ; it also serves
  # the response cache. Free plan; internal-only (empty ipAllowList).
  - type: redis
    name: fiberpaykit-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: fiberpaykit-db
    plan: free
